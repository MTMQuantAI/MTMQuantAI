      <path d="M67 82 L59 72 L72 69" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="256" y="122" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#6d28d9">Self-play feedback and evaluation</text>
