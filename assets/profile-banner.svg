    <text x="34" y="48" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#0f172a">Agentic Market Research Loop</text>

    <g transform="translate(42 88)">
      <rect x="0" y="0" width="120" height="62" rx="14" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
      <text x="60" y="27" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#1e3a8a">LLM</text>
      <text x="60" y="47" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#1e3a8a">Agents</text>

      <rect x="186" y="0" width="140" height="62" rx="14" fill="#dcfce7" stroke="#059669" stroke-width="2"/>
      <text x="256" y="27" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#065f46">Market</text>
      <text x="256" y="47" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#065f46">Simulator</text>

      <rect x="392" y="0" width="118" height="62" rx="14" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
      <text x="451" y="27" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#92400e">Tools</text>
      <text x="451" y="47" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#92400e">Memory</text>

      <path d="M126 31 H178" stroke="#64748b" stroke-width="3" stroke-linecap="round"/>
      <path d="M172 23 L182 31 L172 39" fill="none" stroke="#64748b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M332 31 H384" stroke="#64748b" stroke-width="3" stroke-linecap="round"/>
      <path d="M378 23 L388 31 L378 39" fill="none" stroke="#64748b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

