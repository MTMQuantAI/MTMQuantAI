  <text x="600" y="272" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#334155">
    LLM-based agents · self-play · numerical understanding · multi-agent market environments · reliable decision-making
