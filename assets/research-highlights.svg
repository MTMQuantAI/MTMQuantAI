<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-labelledby="title desc">
  <title id="title">Research Highlights</title>
  <desc id="desc">Visual cards summarizing publications, open-source code, agent evaluation, and self-play research.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1200" height="300" rx="24" fill="url(#bg)"/>

  <g transform="translate(42 48)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="254" height="190" rx="22" fill="#ffffff"/>
      <circle cx="54" cy="54" r="26" fill="#dbeafe"/>
      <path d="M43 54 h22 M54 43 v22" stroke="#2563eb" stroke-width="5" stroke-linecap="round"/>
      <text x="32" y="108" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="32" font-weight="850" fill="#0f172a">ICML 2026</text>
      <text x="32" y="140" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#2563eb">Self-play reasoning</text>
      <text x="32" y="166" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#475569">Digital Twin Markets</text>
    </g>

    <g transform="translate(286 0)" filter="url(#shadow)">
      <rect x="0" y="0" width="254" height="190" rx="22" fill="#ffffff"/>
      <circle cx="54" cy="54" r="26" fill="#dcfce7"/>
      <path d="M40 61 c16 -28 28 -28 44 0" fill="none" stroke="#059669" stroke-width="5" stroke-linecap="round"/>
      <text x="32" y="108" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="32" font-weight="850" fill="#0f172a">EMNLP 2025</text>
      <text x="32" y="140" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#059669">Agent evaluation</text>
      <text x="32" y="166" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#475569">Agent Trading Arena</text>
    </g>

    <g transform="translate(572 0)" filter="url(#shadow)">
      <rect x="0" y="0" width="254" height="190" rx="22" fill="#ffffff"/>
      <circle cx="54" cy="54" r="26" fill="#fef3c7"/>
      <path d="M40 60 h28 l12 -16 v32 l-12 -16" fill="none" stroke="#d97706" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="32" y="108" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="32" font-weight="850" fill="#0f172a">Open Code</text>
      <text x="32" y="140" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#d97706">Reproducible pipeline</text>
      <text x="32" y="166" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#475569">MTMQuantAI/Agent-Trading-Arena</text>
    </g>

    <g transform="translate(858 0)" filter="url(#shadow)">
      <rect x="0" y="0" width="254" height="190" rx="22" fill="#ffffff"/>
      <circle cx="54" cy="54" r="26" fill="#ede9fe"/>
      <path d="M42 54 h24 M54 42 v24 M73 45 l-10 18" stroke="#7c3aed" stroke-width="5" stroke-linecap="round"/>
      <text x="32" y="108" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="32" font-weight="850" fill="#0f172a">LLM Agents</text>
      <text x="32" y="140" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#7c3aed">Quantitative decisions</text>
      <text x="32" y="166" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#475569">tools, memory, feedback</text>
    </g>
